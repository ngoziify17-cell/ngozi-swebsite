<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            border-radius:20px ;
        }

        body{
            position: relative;
            width: 100%;
            height: 100vh;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color:rgb(231, 231, 242);
        }


        .container{
            position: absolute;
            width: 350px;
            height: auto;
            background:#fff;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            padding: 20px;
        }
        img{
            position: relative;
            width: 70px;
            height: 70px;
            background-color: #eee;
            border-radius: 50%;
            margin-top: 20px;
            margin-bottom: 20px;
            margin-left: auto;
             margin-right: auto;
             display: block;
        }

        .container h2{
            position:relative;
            width: 100%;
            height: auto;
            text-align: center;
            margin-bottom: 10px;
            font-size: 25px;
            text-transform: capitalize;
            font-weight: bold;
            color:#444;
            /* background-color: aqua; */
        }

        .container p{
            position: relative;
            width: 100%;
            height: auto;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 15px;
            color: #333;
        }
        .container form{
            position: relative;
            height: auto;
            display: flex;
            flex-direction: column;
            /* background-color: aqua; */
            ;
        }

        .container label{
            position: relative;
            width: 100%;
            height: auto;
            margin-bottom: 8px;
            font-size: 15px;
            text-transform: capitalize;
            }

            .container form input{
                position: relative;
                width: 100%;
                height: auto;
                padding: 10px 20px;
                margin-bottom: 10px;
                border-radius: 10px;
                border: 1px solid #383737;
            }

            button{
                position: relative;
                width: 100%;
                height: 45px;
                border: 0;
                font-size:16px ;
                font-weight: bold;
                text-transform: capitalize;
                display: direction;
                cursor: pointer;
                border-radius: 10px;
                background-color: rgb(78, 53, 234);
            }

            .container form{
                position: relative;
                width: 100%;
                height: auto;
                margin-bottom: 12px;
                font-size: 20px;
                text-transform: capitalize;
            }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.pinimg.com/736x/3f/1b/ed/3f1bed7c412853247ef2b4f50452638c.jpg" >
        <h2>create an account</h2>
        <p>Sign up to get the exclusive features,personalised content and start your journey with us!</p>
        <form>
            <label for="name">name</label>
            <input type="email" placeholder="enter your name">

            <label for="email">email</label>
            <input type="email" placeholder="enter your email">

            <label for="Password">Password</label>
            <input type="password" placeholder="enter your password">

            <button>sign up</button>

            <p>Already a member? <a href="#">Sign in</a></p>
        </form>
    </div>
</body>
</html>
