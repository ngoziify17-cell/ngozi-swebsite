<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my website</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            border-radius:20px ;
        }

        body{
            position: relative;
            width: 100%;
            height: 100vh;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            
        }


        .container{
            position: absolute;
            width: 300px;
            height: auto;
            background: color #777;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            padding: 20px;
            background-color: aqua;
        }

        .container h2{
            position:relative;
            width: 100%;
            height: auto;
            text-align: center;
            margin-bottom: 20px;
            font-size: 35px;
            text-transform: capitalize;
            font-weight: bold;
            background-color: aqua;
        }

        .container form{
            position: relative;
            height: auto;
            display: flex;
            flex-direction: column;
            background-color: aqua;
            ;
        }

        .container label{
            position: relative;
            width: 100%;
            height: auto;
            margin-bottom: 8px;
            font-size: 20px;
            text-transform: capitalize;
            background-color:aqua ;
            }

            .container form input{
                position: relative;
                width: 100%;
                height: 50px;
                padding: 10px 20px;
                margin-bottom: 10px;
                border-radius: 20px;
                background-color: aqua;
            }

            button{
                position: relative;
                width: 100%;
                height: 45px;
                border: 0;
                font-size:16px ;
                font-weight: bold;
                text-transform: capitalize;
                display: direction;
                cursor: pointer;
                border-radius: 20px;
                background-color: snow;
            }

            .container form name{
                position: relative;
                width: 100%;
                height: auto;
                margin-bottom: 12px;
                font-size: 20px;
                text-transform: capitalize;
            }
    </style>
</head>
<body>
    <div class="container">
        <img scr="">
        <h2>create an accout</h2>
        <form>
            <label for="name">name</label>
            <input type="email" placeholder="enter your name">

            <label for="email">email</label>
            <input type="email" placeholder="enter your email">

            <label for="Password">Password</label>
            <input type="password" placeholder="enter your password">

            <button>sign up</button>
        </form>
    </div>
</body>
</html>
