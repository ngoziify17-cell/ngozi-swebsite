<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body{
        position: relative;
        width: 100%;
        height: 100vh;
        background: #eee;
        }

        .container{
            position: absolute;
            width: 400px;
            height: auto;
            background-color: #fff;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            padding: 20px;
        }

        h2{
            position: relative;
            width: 100%;
            height:auto ;
            text-align: center;
            text-transform: capitalize;
            margin-bottom: 20px;
        }
        .container form{
            position: relative;
            width: 100%;
            height: auto;
            display: flex;
         flex-direction: column;

        }

      .container form label{
        position: relative;
        width: 100%;
        height: auto;
        margin-bottom: 5px;
        font-size: 14px;
        font-weight: 500 ;
        text-transform: capitalize;
      }

      .container form input{
        position: relative;
        width: 100%;
        height: auto;
        padding: 10px 15px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
      }

      button{
        position: relative;
        width:100% ;
        height:40px;
        background-color: blue;
        border-radius: 10px;
        border: none;
        color: #fff;
        font-size:14px ;
      }

    span{
        position: relative;
        width: 100%;
        height: 40px;
        background: #eee;
    }
    


    </style>
</head>
<body>
    <div class="container">
        <h2>login</h2>
        <form>
            <label for="email">email</label>
            <input type="email"placeholder="enter to email">

            <label for="password"> password</label>
            <input type="password" placeholder="enter password">
            <button>login</button>

            <span>or</span>

            <button>continue with google</button>
        </form>
    </div>
</body>
</html>
