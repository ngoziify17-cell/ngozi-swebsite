<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            position: relative;
            width: 100%;
            height: 100vh;
            background: #eee;
        }
        div{
            position: absolute;
            width: 280px;
            height: auto;
            background-color: #fff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
        }

        h2{
            position: relative;
            width: 100%;
            height: auto;
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;

        }
        input{
            position: relative;
            width: 100%; 
            height: auto;
            display: block;
            padding: 8px 15px;
            margin-bottom: 10px;
            outline: none;
            border: 1px solid grey;
            border-radius: 5px;
            color: #333;
            text-transform: capitalize;
        }
        input:hover{
            border: 2px solid green;


        }

        button{
            position: relative;
            width: 150px;
            height: 40px;
            border: 1px solid grey;
            text-align: center;
            display: block;
            margin-left: auto;
            margin-right: auto;
            color: #fff;
            background: green;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background: red;
            color:green      ;
        }
    </style>
</head>
<body>
    <div>
        <h2>Customer page</h2>

        <form action="">
            <input type="text" placeholder="Username">
            <input type="password" placeholder="password">
            <button>Login</button>
        </form>
    </div>
</body>
</html>
