<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>padding and margin</title>
    <style>
     *{
        padding:0;
        margin:0;
     }

    p{
        position:relative;
        width: 100%;
        height: auto;
        border: 1px soild black;
        padding: 20px;
        margin: 20px;
    }

    .box{
        position:relative;
        width: 100px;
        height: 100px;
        background-color: red;
        padding: 20px;
        margin: 20px;
    }
    .another-box{
        position:relative;
        width: 50px;
        height: 50px;
        background-color: blue;
        /* padding: 20px; */
        margin: 20px;
    }
    </style>
    

</head>
<body>
   <h2>Border,Margin, Padding</h2>

   <div class="box">
    <div class="another-box"></div>
   </div>
</body>
</html>
