<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            
        }
       
        .container{
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #000;

        }

        .container .box{
            position: relative;
            width: 30%;
            height: auto;
            background-color: #fff;
            top:50%;
            left: 50%;
            transform: translate(-50%,-50%);
            padding: 20px;
        }

        .container .box h2{
            position: relative;
            width: 100%;
            height: auto;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .container .box p{
            position: relative;
            width: 100%;
            height: auto;
            text-align: center;
            margin-bottom: 10px;
            color: #444;
            font-size: 16px;
        }

        .container form{
            position: relative;
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
        }

        .container form input{
            position: relative;
            width:350px ;
            height: auto;
            padding: 12px 20px;
            margin-bottom: 10px;
            border-radius: 50px;
            outline: none;
            border: 1px solid #444;
        
        }

        

        .container form textarea{
            position: relative;
            width: 350px;
            height: 150px;
            padding: 5px;
            margin-bottom: 10px;
        }

        button{
            position: relative;
            width: 350px;
            height: 40px;
            background-color: #fff;
        }
    </style>
</head> 
<body>
    <div class="container">
        <div class="box">
            <h2>feedback form</h2>
            <p>can you fillin the form</p>  
            <form>
                <input type="text" placeholder="your name">

                <input type="email " placeholder="mail id">


                 <input type="number" placeholder="mobile number">

        

                 <textarea placeholder="your feedback"></textarea>

                 <button>submit</button>

            </form>
        </div>
        
        
    </div>
</body>
</html>
