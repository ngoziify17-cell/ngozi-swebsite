<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Survival Game</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
font-family:Arial;
z-index:100;
}

#start{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
cursor:pointer;
}
</style>
</head>
<body>

<div id="ui">
Health: 100<br>
Score: 0
</div>

<div id="start">
CLICK TO START
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS

scene.add(new THREE.AmbientLight(0xffffff,1));

const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(20,50,20);
scene.add(sun);

// GROUND

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({
color:0x228B22
})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

// TREES

for(let i=0;i<50;i++){

const trunk = new THREE.Mesh(
new THREE.CylinderGeometry(.3,.3,3),
new THREE.MeshStandardMaterial({color:0x8B4513})
);

trunk.position.set(
(Math.random()-0.5)*180,
1.5,
(Math.random()-0.5)*180
);

scene.add(trunk);

const leaves = new THREE.Mesh(
new THREE.SphereGeometry(1.5),
new THREE.MeshStandardMaterial({color:0x006400})
);

leaves.position.copy(trunk.position);
leaves.position.y += 2.5;

scene.add(leaves);
}

// PLAYER

camera.position.set(0,2,10);

let health = 100;
let score = 0;

// ENEMIES

const enemies = [];

for(let i=0;i<5;i++){

const enemy = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({
color:0xff0000
})
);

body.position.y = 1;

enemy.add(body);

enemy.position.set(
(Math.random()-0.5)*50,
0,
(Math.random()-0.5)*50
);

enemy.userData = {
dir: Math.random()*Math.PI*2
};

scene.add(enemy);
enemies.push(enemy);
}

// CONTROLS

let yaw=0;
let pitch=0;

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement){

yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;

pitch=Math.max(
-Math.PI/2,
Math.min(Math.PI/2,pitch)
);

}
});

document.getElementById("start").onclick=()=>{

document.body.requestPointerLock();

document.getElementById("start").style.display="none";

};

// GAME LOOP

function animate(){

requestAnimationFrame(animate);

camera.rotation.order="YXZ";
camera.rotation.y=yaw;
camera.rotation.x=pitch;

const speed=0.15;

const forward=new THREE.Vector3(
Math.sin(yaw),
0,
Math.cos(yaw)
);

const right=new THREE.Vector3(
Math.cos(yaw),
0,
-Math.sin(yaw)
);

if(keys["w"])
camera.position.add(forward.clone().multiplyScalar(-speed));

if(keys["s"])
camera.position.add(forward.clone().multiplyScalar(speed));

if(keys["a"])
camera.position.add(right.clone().multiplyScalar(-speed));

if(keys["d"])
camera.position.add(right.clone().multiplyScalar(speed));

// ENEMY AI

enemies.forEach(enemy=>{

enemy.userData.dir +=
(Math.random()-0.5)*0.02;

enemy.position.x +=
Math.sin(enemy.userData.dir)*0.05;

enemy.position.z +=
Math.cos(enemy.userData.dir)*0.05;

// CHASE PLAYER

const dx =
camera.position.x - enemy.position.x;

const dz =
camera.position.z - enemy.position.z;

const distance =
Math.sqrt(dx*dx+dz*dz);

if(distance < 15){

enemy.position.x += dx*0.01;
enemy.position.z += dz*0.01;

}

if(distance < 2){

health -= 0.05;

if(health < 0)
health = 0;

}

});

// UI

document.getElementById("ui").innerHTML=
`Health: ${Math.floor(health)}<br>
Score: ${score}`;

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight


);
let velocityY = 0;
let isGrounded = true;

const gravity = 0.01;
const jumpForce = 0.25;

document.addEventListener("keydown", (e) => {

    keys[e.key.toLowerCase()] = true;

    if (e.code === "Space" && isGrounded) {
        velocityY = jumpForce;
        isGrounded = false;
    }

    // Gravity

velocityY -= gravity;

camera.position.y += velocityY;

// Ground collision

if (camera.position.y <= 2) {

    camera.position.y = 2;
    velocityY = 0;
    isGrounded = true;

}


});const moveSpeed = isGrounded ? 0.15 : 0.08;

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

sun.castShadow = true;

player.castShadow = true;
player.receiveShadow = true;

ground.receiveShadow = true;

const enemy = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({ color: 0xff0000 })
);

renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
sun.castShadow = true;

sun.shadow.mapSize.width = 4096;
sun.shadow.mapSize.height = 4096;

scene.fog = new THREE.Fog(
    0x9db3c8,
    30,
    300
);

gun.position.x =
Math.sin(Date.now()*0.01)*0.01;

gun.position.y =
Math.cos(Date.now()*0.02)*0.01;

if(moving){

camera.position.y =
2 + Math.sin(Date.now()*0.01)*0.05;

}

velocity.lerp(
targetVelocity,
0.08
);
mixer.update(delta);

new Audio("footstep.mp3").play();
new Audio("wind.mp3").play();
new Audio("birds.mp3").play();

window.addEventListener("click", () => {

    const raycaster = new THREE.Raycaster();

    raycaster.setFromCamera(
        new THREE.Vector2(0, 0),
        camera
    );

    const hits = raycaster.intersectObjects(
        enemies,
        true
    );

    if (hits.length > 0) {

        const enemy = hits[0].object.parent;

        enemy.userData.health -= 25;

        if (enemy.userData.health <= 0) {

            scene.remove(enemy);

            score += 100;

        }
    }

});

enemy.userData = {
    health: 100,
    dir: Math.random() * Math.PI * 2
};

const medkit = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({
        color:0x00ff00
    })
);

medkit.position.set(10,1,10);

scene.add(medkit);
});scene.fog = new THREE.Fog(0x87ceeb, 50, 300);

</script>
</body>
</html>
