<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>book in flight</title>
    <style>
      *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      .container{
        position: relative;
        width: 100%;
        height: 100vh;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    
        background-color: rgb(232, 225, 232);

      }

      .container .box{
      position: absolute;
      width:350px;
      height: auto;
       color: #000;
       top: 50%;
       left: 50%;
       transform: translate(-50%,-50%);
       padding: 20px;
       flex-direction: column;
       background-color: rgb(217, 217, 236);
       margin-bottom: 10px;
       margin-top: 10px;
       padding: 20px;
      }

      .container h2{
        position: relative;
        width: 100%;
        height: auto;
        color:darkgreen;
        margin-bottom: 10px;
        margin-top: 10px;
      text-transform: uppercase;
      }
        
      

      .container form{
        position: relative;
        width: 100%;
        height: auto;
       display: flex;
       flex-direction: column;
       
      }
     
      .container .box form .input-group{
        position: relative;
        width:  100%;
        height: auto;
        display: flex;
        flex-direction: column;
        margin-bottom: 10px;
      }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
          
            <h2>Flight book form</h2>

            <form action="">
               <div class="input-group">
                
                 <label for="">Full name</label>
                <input type="text">
               </div>

               <div class="input-group">
                 <label for="">Email address</label>
                <input type="email">
               </div>

               <div class="input-group">
                 <label for="">phone number</label>
                <input type="number">
               </div>

                <div class="input-group">
                 <label for="">Date of birth</label>
                <input type="date">
               </div>

               <div class="input-group">
                 <label for="">Departure city</label>
                <select name="" id="">
                  <option value="lagos">Lagos</option>
                  <option value="abuja">Abuja</option>
                  <option value="port-harcourt">Port Harcourt</option>
                  <option value="enugu">Enugu</option>
                  <option value="bayesla">Bayesla</option>
                </select>
               </div>




               <div class="input-group">
                 <label for="">Return date</label>
                <input type="date">
               </div>

               <div class="input-group">
                 <label for="">Number of passengers</label>
                <input type="number">
               </div>

               <div class="input-group">
                 <label for="">Class preference</label>
                  <select name="" id="">
                    <option value="economy">Economy</option>
                    <option value="business">Business</option>
                    <option value="first-class">First class</option>
                  </select>
               </div>

               <div class="input-group">
                 <label for="">Dietary requirement</label>
                <select name="" id="">
                  <option value="">Select an option</option>
                  <option value="vegetarian">Vegetarian</option>
                  <option value="vegan">Vegan</option>
                  <option value="gluten-free">Gluten-Free</option>
                </select>
               </div>


               <div class="input-group">
                 <label for="">Would you like to add checked baggage?</label>
                <input type="checkbox">yes
                <input type="checkbox">no
               </div>


               <button>Submit form</button>

            </form>

        </div>
    </div>
</body>
</html>
