<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;

        }

        .container{
        position: relative;
        width: 100%;
        height: 100vh;
        background-color: #eee;
        }

        .container .flex-div{
            position: relative;
            width: 50%;
            height: 50%;
            background-color: #fff;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            display: flex;
        }

        .container .flex-div .column:first-child{
            position: relative;
            width: 100%;
            height: auto;
            background-color: #fff;
        }
        .container .flex-div .container:last-child{
            position: relative;
            width: 100%;
            height: auto;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>sign in</h2>
        <p>sign in with email password</p>
        <div class="flex-div ">
            <div class="column">left</div>
            <div class="column">right</div>
        </div>
    </div>
</body>
</html>
