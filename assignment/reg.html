<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/YOUR_KIT_CODE.js" crossorigin="anonymous"></script>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;

        }

        .container{
        position: relative;
        width: 100%;
        height: 100vh;
        background-color: rgb(241, 224, 239);
        }

        .container .box{
            position: relative;
            width: 60%;
            height: 500px;
            background-color: #fff;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            display: flex;
            justify-content: center;
        }

        .container .box .left{
            position: relative;
            width: 40%;
            height: 100%;
            background-color: rgb(236, 177, 222);
            padding: 20px;

        }

        .container .box .left .logo{
            position: relative;
            width: 100px;
            height: 80px;
            display: flex;
            justify-content: center;
            text-align: center;
            margin-left: auto;
            margin-right:auto;
            
            /* background-color: rgb(241, 224, 239); */
        }
        .container .box .left .logo img{
            position: relative;
            width: 100%;
            height: 100%;
            margin-bottom: 40px;
        }
        .container .box .left .image-left{
            position: relative;
            width: 300px;
            height: auto;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .container .box .left .image-left img{
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            align-items: center;   
            display: flex; 
            justify-content: center;
        
         }

        .container .box .left p{
            position: relative;
            width: 100%;
            height: auto;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .container .box .right{
            position: relative;
            width: 60%;
            height: 100%;
            background-color:#fff;
            padding: 20px;
        }

        .container .box .right .language{
            position: relative;
            width: 100%;
            height: auto;
            text-align: right;
            display: block;
            margin-top: 10px;
            margin-right: 20px;
            font-size: 12px;
            color:#333;

        }
        .container .box .right p{
            position:relative;
            width:100%;
            height: auto;
            text-align: left;
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }
        .container .box .right h2{
            position: relative;
            width: 100%;
            height: auto;
            text-align: left;
            font-size: 24px;
            color: #000;
            margin-bottom: 20px;
        }
        .container .box .right form{
            position: relative;
            width: 80%;
            height: auto;
            margin-left: 50px;
            z-index: 2;
            
        }
        .container .box .right form input{
            position: relative;
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }
        .container .box .right form .checkbox{
            position: relative;
            width: 100%;
            height: auto;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            /* background-color: red; */
            color: #333;
            font-size: 12px;
        }
        .container .box .right form .checkbox input[type="checkbox"]{
            position: relative;
            margin-right: 5px;
            bottom: 3px;
            padding: 0;
            width: 20px;
            align-items: center;
            text-align: center;
            top: 5px;
            height: auto;
            
        }
        .container .box .right form .checkbox label{
            position: relative;
            width: 100%;
            height: auto;
            font-size: 12px;
            color: #333;
        }

        .container .box .right form button{
            position: relative;
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container .box .right form button:hover{
            background-color: #555;
        }
        .container .box .right form .google-btn{
            width: 100%;
            position: relative;
            background-color: #fff;
            color: #333;
            display: flex;
            justify-content: center;
            border: 2px solid #ccc;
            align-items: center;
        }
        .container .box .right form button img{
            position: relative;
            width: 20px;
            height: 20px;
            margin-right: 10px;
            align-items: center;
        }
        .container .box .right  span{
            position: absolute;
            width: 100%;
            height: auto;
            text-align: center;
            font-size: 12px;
            color: #333;
            bottom: 5px;
        }


        @media (min-width:0) and (max-width:500px){
            .container{
                position: relative;
                width: 100%;
                height: 100vh;
                background-color: rgb(241, 224, 239);
            }
            .container .box .left .logo{
                position:absolute;
                top:0;
                left:0;
            }
            .container .box{
                position: relative;
                width: 70%;
                height: auto;
                background-color: #fff;
                top: 50%;
                left: 50%;
                transform: translate(-50%,-50%);
                
            }
            .container .box .left{
                display: none;
            }
            .container .box .right{
                position: relative;
                width: 100%;
                height: auto;
                background-color:#fff;
                padding: 20px;
        }
        .container .box .right form{
            margin:10px;
            width:90%;

        }
        .container .box .right form button{
            position: relative;
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container .box .right form .google-btn{
           margin-bottom:20px;
        }
        .container .box .right span{
            position: relative;
            text-align:center;
            width:100%;
            margin:0px;
            display:flex;
            justify-content:center;
            background-color: rgb(241, 224, 239);
            top:10px;
        }
    }
       
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="left">
                <div class="logo">
                    <img src="../image/download__3_-removebg-preview (1).png" alt="">
                </div>

                <img src="../image/3d_illustration_of_female_graphic_designer_character_working_on_laptop___Free_PSD-removebg-preview.png" alt="" class="image-left">

                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestias dolores sit similique ex?</p>
            </div>


            <div class="right">
                <span class="language">English(US)</span>

                <p>Free for ever</p>

               

                <form>
                     <h2>Sign Up</h2>
                    <input type="text" placeholder="First Name">
                    <input type="email" placeholder="young@email.com">
                    <input type="password" placeholder="Create a password">

                    <div class="checkbox">
                        <input type="checkbox" id="terms">
                        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    </div>

                        <button type="submit">Sign Up</button>

                        <button class="google-btn"> <img src="https://i.pinimg.com/1200x/45/20/dd/4520ddfc56208707045c56232e946f7f.jpg" alt="Google">Sign up using Google</button>

                
                </form>
                        <span>copyright © 2026 BCCA(Miss Grace). All rights reserved.</span>

            </div>
        </div>
    </div>
</body>
</html>
