<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Page</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: rgb(241, 224, 239);
            background-image:url("");
            background-size: cover;
            background-position: center;
        }
        div{
            position: relative;
            width: 300px;
            height: auto;
            top: 50%;
            left: 50%;
            background:#fff;
            transform: translate(-50%,-50%);
            padding: 20px;
            
        }
        h2{
            position: relative;
            width: 100%;
            height: auto;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        form{
            position: relative;
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        form input{
            position: relative;
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        form button{
            position: relative;
            width: 50%;
            height: 40px;
            background-color: rgb(236, 177, 222);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
    
</head>
<body>
    <div>
        <h2>Customer page</h2>

        <form>
            <input type="text" name="name" placeholder="Enter your name">
            <input type="email" name="email" placeholder="Enter your email">
            <input type="password" name="password" placeholder="Enter your password">
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
